name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless

jobs:
  goreleaser:
    name: GoReleaser (binaries + SBOMs + signatures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-publish:
    name: Helm chart publish
    runs-on: ubuntu-latest
    needs: [goreleaser]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Ensure gh-pages branch exists
        # chart-releaser's `cr index` fails with "fatal: invalid reference:
        # origin/gh-pages" if the pages branch has never been created. Bootstrap
        # an empty index using git plumbing — builds the commit object directly and
        # pushes it, so the build working tree (consumed by the helm package steps
        # below) is never touched and no version-sensitive worktree flags are used.
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists — nothing to bootstrap"
            exit 0
          fi
          echo "Bootstrapping empty gh-pages branch for chart-releaser"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          index_blob=$(printf 'apiVersion: v1\nentries: {}\n' | git hash-object -w --stdin)
          nojekyll_blob=$(printf '' | git hash-object -w --stdin)
          tree=$(printf '100644 blob %s\t.nojekyll\n100644 blob %s\tindex.yaml\n' \
            "$nojekyll_blob" "$index_blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "chore: bootstrap gh-pages for chart-releaser")
          git push origin "$commit:refs/heads/gh-pages"
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Add subchart repos
        run: |
          helm repo add cloudnative-pg     https://cloudnative-pg.github.io/charts
          helm repo add nats               https://nats-io.github.io/k8s/helm/charts
          helm repo add minio              https://charts.min.io/
          helm repo add dex                https://charts.dexidp.io
          helm repo add clickhouse-operator https://docs.altinity.com/clickhouse-operator/
          helm repo update
      - name: Build chart deps
        run: helm dependency build deploy/helm/teo
      - name: Package chart
        run: |
          mkdir -p .chartpkg
          helm package deploy/helm/teo --destination .chartpkg
      - name: Configure git identity
        # chart-releaser's `cr index` makes a commit on gh-pages; without a
        # committer identity it dies with "fatal: empty ident name not allowed".
        # The bootstrap step above only sets identity when it *creates* gh-pages
        # (it early-exits once the branch exists), so set it unconditionally here.
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Update gh-pages index
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/helm
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
