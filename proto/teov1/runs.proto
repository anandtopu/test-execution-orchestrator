syntax = "proto3";

package teo.v1;

option go_package = "github.com/teo-dev/teo/internal/proto/teov1;teov1";

import "google/protobuf/timestamp.proto";

service Runs {
  rpc CreateRun(CreateRunRequest) returns (Run);
  rpc GetRun(GetRunRequest) returns (Run);
  rpc CancelRun(CancelRunRequest) returns (Run);
}

message CreateRunRequest {
  string repo_full_name = 1;
  string commit_sha = 2;
  string branch = 3;
  TestManifest manifest = 4;
  RunBudget budget = 5;
  string trigger_actor = 6;
  int32 trigger_pr_number = 7;
  string idempotency_key = 8;
}

message GetRunRequest { string id = 1; }
message CancelRunRequest { string id = 1; }

message TestManifest {
  string runner = 1;
  repeated TestEntry tests = 2;
}

message TestEntry {
  string path = 1;
  string name = 2;
  string params_hash = 3;
  repeated string tags = 4;
}

message RunBudget {
  int32 max_seconds = 1;
  int32 max_workers = 2;
}

message Run {
  string id = 1;
  string repo_full_name = 2;
  string commit_sha = 3;
  string branch = 4;
  string status = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp finished_at = 7;
  int32 total_duration_ms = 8;
  int32 budget_seconds = 9;
  int32 preemption_count = 10;
}
