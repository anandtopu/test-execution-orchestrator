apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: teo
  policyTypes: [Ingress, Egress]
  ingress:
    # API takes external traffic on http/grpc
    - from:
        - namespaceSelector: {}
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 9090 }
        - { protocol: TCP, port: 3000 }
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    # Allow Postgres / ClickHouse / NATS / S3 in cluster
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: teo
    # Allow GitHub API
    - {}
