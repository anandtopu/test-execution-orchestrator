{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "teo.componentLabels" (dict "Values" .Values "Chart" .Chart "Release" .Release "component" "web") | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: teo
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "teo.componentLabels" (dict "Values" .Values "Chart" .Chart "Release" .Release "component" "web") | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: {{ include "teo.image" (dict "Values" .Values "Chart" .Chart "repo" .Values.web.image.repository "imageTag" "") }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            # The Next.js app proxies to the API via this base URL; auth keys
            # stay server-side in the Next route handlers (web/src/app/api/*).
            - name: TEO_API_BASE_URL
              value: "http://{{ .Release.Name }}-api:{{ .Values.api.service.httpPort }}"
            - name: TEO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-web-api-key
                  key: api-key
                  optional: true
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            # Next.js writes to /tmp and .next/cache at runtime; allowing
            # writes only via an emptyDir keeps the rest of the FS read-only.
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "teo.componentLabels" (dict "Values" .Values "Chart" .Chart "Release" .Release "component" "web") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: teo
    app.kubernetes.io/component: web
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
