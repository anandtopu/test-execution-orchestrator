# golangci-lint configuration for TEO. Pinned to v2.x in CI; v1 configs are
# rejected by v2.0+. See the comment in .github/workflows/ci.yml for why we
# need v2 (Go 1.25 stdlib export-data format).
version: "2"

run:
  timeout: 5m
  go: "1.25"
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - revive
    - staticcheck
    - unused
    - govet
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - prealloc
    - copyloopvar

  settings:
    errcheck:
      # check-blank=false: the `_ = foo()` pattern is the canonical Go idiom
      # for "I know this returns an error and I'm intentionally ignoring it"
      # (response-writer Write, JSON encode to ResponseWriter, etc.).
      # Forcing wrappers around it adds noise without catching real bugs.
      check-blank: false
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close
        # errcheck's exclude-functions matches by exact concrete type (the
        # io.Closer interface entry above doesn't always resolve), so list
        # the deferred-cleanup types we actually use:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (github.com/ClickHouse/clickhouse-go/v2/lib/driver.Conn).Close
        - (github.com/jackc/pgx/v5/pgxpool.Pool).Close
        # pgx Tx Rollback after a Commit returns ErrTxClosed by design — the
        # canonical pattern is `defer tx.Rollback(ctx)` and we don't act on
        # the result. database/sql's Tx (used by internal/migrate) is the same:
        # a deferred Rollback that no-ops after Commit returns ErrTxDone.
        - (github.com/jackc/pgx/v5.Tx).Rollback
        - (*database/sql.Tx).Rollback
        - (github.com/jackc/pgx/v5.Rows).Close
        - (github.com/ClickHouse/clickhouse-go/v2/lib/driver.Rows).Close
        - (*net/http.Server).Shutdown
        # tabwriter.Writer.Flush returns an error we don't care about in
        # CLI tabular output.
        - (*text/tabwriter.Writer).Flush
        # Stdout-bound formatted writes; errors are not actionable.
        - fmt.Fprintln
        - fmt.Fprintf
        # Best-effort cleanup of temp dirs.
        - os.RemoveAll

    gosec:
      excludes:
        # G104: errors not checked — already covered by errcheck.
        - G104
      config:
        G306: "0644"

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        # `exported` (must-have-doc-comments) is deferred; the codebase has
        # ~6 missing comments on internal types that would each need a one-
        # liner. Tracked as a follow-up; not gating v1.0.0.
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    misspell:
      locale: US
      # "cancelled" (British) is TEO's domain spelling — it's baked into the
      # teo.runs status enum (migrations + SQL), so comments referencing the
      # status legitimately use it. Don't let locale: US flag it.
      ignore-rules:
        - cancelled

  exclusions:
    # Generated files (protoc-gen-go output, etc.) — also auto-detected via the
    # standard "Code generated ... DO NOT EDIT." header.
    generated: lax
    paths:
      - vendor
      - bin
      - dist
      - deploy
      # node_modules pulls in third-party Go scraps (e.g. flatted) when the
      # web/ workspace is npm-installed locally; not part of our module.
      - web/node_modules
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
      # Runner adapters (pytest / go test / jest) legitimately need to launch
      # subprocesses with caller-supplied test paths and read their JSON
      # output files. G204 / G304 are false positives in this scope.
      - path: pkg/adapter/(pytest|gotest|jest)/
        linters:
          - gosec
      # OTLP timestamp conversions (uint64 nanos ↔ int64 / int8 status codes)
      # use the canonical proto-encoding pattern; explicit overflow checks
      # would add noise without catching real bugs at this layer.
      - path: (internal/api/export\.go|internal/resultpipeline/otlp\.go|internal/runmanager/manager\.go|internal/grpcsvc/runs\.go)
        text: "G115:"

# In v2 schema, gofmt + goimports moved out of `linters` into a separate
# `formatters` section. Behaviour is unchanged — both still run as part of
# `golangci-lint run`.
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/teo-dev/teo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
